name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: skills/cartograph/package-lock.json

      - name: Install Cartograph skill runtime
        run: npm --prefix skills/cartograph ci

      - name: Check source
        run: npm --prefix skills/cartograph run check
