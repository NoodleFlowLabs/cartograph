<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="skills/cartograph/assets/cartograph-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cartograph</title>
    <style>
      :root {
        color: #e8e5dd;
        background: #050507;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }
      main {
        width: min(680px, calc(100vw - 40px));
      }
      h1 {
        margin: 0 0 16px;
        font-size: 38px;
        line-height: 1.05;
      }
      p {
        color: #9b968a;
        font-size: 17px;
        line-height: 1.55;
      }
      pre {
        overflow-x: auto;
        padding: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 6px;
        color: #c8a750;
        background: #111116;
      }
      code {
        font-family:
          "SF Mono",
          "Fira Code",
          Menlo,
          monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Cartograph runs locally.</h1>
      <p>
        After installing the Cartograph skill and running <code>/cartograph</code>,
        start the bundled UI from your project root:
      </p>
      <pre><code>node skills/cartograph/server.mjs</code></pre>
      <p>
        Then open <code>http://127.0.0.1:6270</code>. The UI watches
        <code>cartograph.json</code> and refreshes when your agent regenerates it.
      </p>
    </main>
  </body>
</html>
